<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login theme.css">
    <link rel="stylesheet" href="password theme.css">

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        const EMAILJS_PUBLIC_KEY  = "0CHuTO63GnJ1KlbVv";
        const EMAILJS_SERVICE_ID  = "service_kythrpn";
        const EMAILJS_TEMPLATE_ID = "template_whoss4o";

        emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    </script>
</head>
<body>

<div class="centre-card">

    <!-- Back link -->
    <a href="Login page.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to login
    </a>

    <!-- Icon -->
    <div class="page-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
    </div>

    <!-- Form -->
    <div id="forgot-form-wrapper">
        <h1 class="form-title">Forgot Password</h1>
        <p class="form-subtitle">Enter your email and we'll send you a reset link.</p>

        <div class="field">
            <label for="femail">Email Address</label>
            <div class="input-wrap">
                <input type="email" id="femail" name="femail" placeholder="you@example.com" autocomplete="email">
            </div>
            <span class="field-error" id="email-error">Please enter a valid email address.</span>
        </div>

        <button class="submit-btn" id="send-btn" onclick="handleForgot(event)">Send Reset Link</button>

        <p class="switch-text" style="margin-top:22px;">
            Remembered it? <a href="Login page.html">Sign in</a>
        </p>
    </div>

    <!-- Success state -->
    <div class="success-box" id="success-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.128.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.572 2.81.7A2 2 0 0 1 21.72 17z"/>
        </svg>
        <h3>Check your inbox</h3>
        <p>A reset link has been sent to<br><strong id="sent-to" style="color:#b8a4e0;"></strong></p>
        <p style="margin-top:4px;">Didn't receive it? <a href="#" onclick="resend(event)">Resend</a></p>
    </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    const emailInput  = document.getElementById('femail');
    const emailError  = document.getElementById('email-error');
    const sendBtn     = document.getElementById('send-btn');
    const formWrapper = document.getElementById('forgot-form-wrapper');
    const successBox  = document.getElementById('success-box');
    const sentTo      = document.getElementById('sent-to');
    const toast       = document.getElementById('toast');

    let lastSentEmail = '';

    function isValidEmail(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    }

    function showToast(msg, duration = 3000) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    emailInput.addEventListener('input', () => {
        if (emailError.classList.contains('visible') && isValidEmail(emailInput.value)) {
            emailInput.classList.remove('error');
            emailError.classList.remove('visible');
        }
    });

    // Generates a unique token and builds the reset URL
    function generateResetLink(email) {
        const token     = btoa(email + ':' + Date.now() + ':' + Math.random());
        const baseUrl   = window.location.origin + '/reset-password.html'; // ✅ adjust path if needed
        return `${baseUrl}?token=${encodeURIComponent(token)}&email=${encodeURIComponent(email)}`;
    }

    async function sendResetEmail(email) {
        const resetLink = generateResetLink(email);

        const templateParams = {
            to_email:   email,
            reset_link: resetLink,
        };

        // EmailJS send
        const response = await emailjs.send(
            EMAILJS_SERVICE_ID,
            EMAILJS_TEMPLATE_ID,
            templateParams
        );

        return response;
    }

    async function handleForgot(e) {
        e.preventDefault();
        const val = emailInput.value.trim();

        if (!isValidEmail(val)) {
            emailInput.classList.add('error');
            emailError.classList.add('visible');
            emailInput.focus();
            return;
        }

        // Loading state
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="spinner"></span>Sending…';

        try {
            await sendResetEmail(val);

            lastSentEmail = val;
            sentTo.textContent = val;
            formWrapper.style.display = 'none';
            successBox.classList.add('visible');

        } catch (err) {
            console.error('EmailJS error:', err);
            showToast('❌ Failed to send email. Please try again.');
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send Reset Link';
        }
    }

    async function resend(e) {
        e.preventDefault();
        if (!lastSentEmail) return;

        try {
            await sendResetEmail(lastSentEmail);
            showToast('✉️  Reset link resent!');
        } catch (err) {
            showToast('❌ Failed to resend. Please try again.');
        }
    }

    emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleForgot(e);
    });
</script>

</body>
</html>
