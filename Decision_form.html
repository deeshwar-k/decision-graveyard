<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Decision – Decision Graveyard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home theme.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

    <header>
        <a href="#" class="header-logo">Decision <span>Graveyard</span></a>
        <div class="profile">
            <span class="profile-name">Name</span>
            <div class="avatar" id="avatarBtn">N</div>
            <div class="dropdown" id="dropdown">
                <p>Name</p>
                <hr>
                <a href="settings.html">Settings</a>
                <a href="#" id="logoutBtn">Log out</a>
            </div>
        </div>
    </header>

    <div class="body-wrap">

        <nav>
            <ul class="links">
                <li><a href="home page.html">🏠 Home</a></li>
                <li><a href="Decision_form.html" class="active">➕ Add Decision</a></li>
                <li><a href="Timeline page.html">📅 Timeline</a></li>
                <li><a href="insights.html">📊 Insights</a></li>
                <li><a href="lessons.html">📖 Lessons</a></li>
            </ul>
        </nav>

        <main class="main-content">

            <div class="hero">
                <h1 class="hero-title">Bury a New Decision</h1>
                <p class="hero-sub">Record the choices you've made — every detail helps you learn from the past and make better calls in the future.</p>
            </div>

            <div class="form-card">

                <!-- Basic Info -->
                <div class="form-section">
                    <div class="form-section-title">Basic Info</div>
                    <div class="form-row-4">
                        <div class="form-group">
                            <label>Decision Title</label>
                            <input type="text" name="ftitle" placeholder="What did you decide?">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select name="fcategory">
                                <option>Career</option>
                                <option>Education</option>
                                <option>Finance</option>
                                <option>Health</option>
                                <option>Personal</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" name="fdate">
                        </div>
                        <div class="form-group">
                            <label>Tags</label>
                            <input type="text" name="ftags" placeholder="tag1, tag2">
                        </div>
                    </div>
                </div>

                <!-- Context -->
                <div class="form-section">
                    <div class="form-section-title">Context</div>
                    <div class="form-group">
                        <label>Situation</label>
                        <textarea name="fsituation" rows="4" placeholder="Describe the situation you were in..."></textarea>
                    </div>
                    <div class="form-group" style="margin-top: 16px;">
                        <label>Risk Level</label>
                        <div class="radio-group">
                            <label class="radio-opt" data-val="low" data-group="risk">
                                <input type="radio" name="flevel" value="low">
                                <span class="dot"></span>Low
                            </label>
                            <label class="radio-opt" data-val="medium" data-group="risk">
                                <input type="radio" name="flevel" value="medium">
                                <span class="dot"></span>Medium
                            </label>
                            <label class="radio-opt" data-val="high" data-group="risk">
                                <input type="radio" name="flevel" value="high">
                                <span class="dot"></span>High
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Reflection -->
                <div class="form-section">
                    <div class="form-section-title">Reflection</div>
                    <div class="form-group">
                        <label>Thought Process</label>
                        <textarea name="fthoughts" rows="4" placeholder="Walk through how you reasoned about this decision..."></textarea>
                    </div>
                    <div class="form-row-2" style="margin-top: 16px;">
                        <div class="form-group">
                            <label>Final Decision</label>
                            <input type="text" name="ffdecision" placeholder="What did you ultimately choose?">
                        </div>
                        <div class="form-group">
                            <label>Outcome</label>
                            <div class="radio-group">
                                <label class="radio-opt" data-val="success" data-group="outcome">
                                    <input type="radio" name="foutcome" value="success">
                                    <span class="dot"></span>Success
                                </label>
                                <label class="radio-opt" data-val="failure" data-group="outcome">
                                    <input type="radio" name="foutcome" value="failure">
                                    <span class="dot"></span>Failure
                                </label>
                                <label class="radio-opt" data-val="ongoing" data-group="outcome">
                                    <input type="radio" name="foutcome" value="ongoing">
                                    <span class="dot"></span>Still Unfolding
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-ghost" type="button">Cancel</button>
                    <button class="btn btn-primary" id="saveDecisionBtn" type="button">Save Decision</button>
                </div>

            </div>
        </main>
    </div>

    <style>
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #222226;
            border: 1px solid #2e2e33;
            border-left: 3px solid #7c3aed;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 13px;
            color: #e8e8f0;
            transition: transform 0.3s;
            z-index: 999;
            white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
    <div class="toast" id="toast"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js';
        import { collection, addDoc, doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js';

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = 'Login page.html';
        });

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                let displayName = user.email.split('@')[0];
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    displayName = data.username || data.firstName || displayName;
                }
                document.querySelector('.profile-name').textContent = displayName;
                document.querySelector('.dropdown p').textContent = displayName;
                document.getElementById('avatarBtn').textContent = displayName.charAt(0).toUpperCase();
            } else {
                window.location.href = 'Login page.html';
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('saveDecisionBtn').addEventListener('click', async () => {
            if (!currentUser) return;

            const btn = document.getElementById('saveDecisionBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.disabled = true;

            try {
                const title = document.querySelector('[name="ftitle"]').value.trim();
                const category = document.querySelector('[name="fcategory"]').value.toLowerCase();
                const date = document.querySelector('[name="fdate"]').value;
                const tagsRaw = document.querySelector('[name="ftags"]').value;
                const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
                const situation = document.querySelector('[name="fsituation"]').value.trim();
                
                const levelOpt = document.querySelector('input[name="flevel"]:checked');
                const riskLevel = levelOpt ? levelOpt.value : '';

                const thoughts = document.querySelector('[name="fthoughts"]').value.trim();
                const finalDecision = document.querySelector('[name="ffdecision"]').value.trim();
                
                const outcomeOpt = document.querySelector('input[name="foutcome"]:checked');
                const outcome = outcomeOpt ? outcomeOpt.value : '';

                if (!title || !category || !outcome) {
                    showToast('Title, Category, and Outcome are required.');
                    btn.textContent = originalText;
                    btn.disabled = false;
                    return;
                }

                // 1. Save Decision
                await addDoc(collection(db, 'users', currentUser.uid, 'decisions'), {
                    title, category, date, tags, situation, riskLevel, thoughts, finalDecision, outcome,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });

                // 2. Update Stats
                const statsRef = doc(db, 'users', currentUser.uid, 'stats', 'overview');
                const statsSnap = await getDoc(statsRef);
                
                if (statsSnap.exists()) {
                    const stats = statsSnap.data();
                    const newTotal = (stats.totalDecisions || 0) + 1;
                    let outcomeKey = outcome === 'success' ? 'successes' : (outcome === 'failure' ? 'failures' : 'ongoing');

                    const byCat = stats.outcomesByCategory || {};
                    if (!byCat[category]) byCat[category] = { success: 0, failure: 0, ongoing: 0 };
                    byCat[category][outcome] = (byCat[category][outcome] || 0) + 1;

                    const byRisk = stats.outcomesByRisk || {};
                    if (riskLevel) {
                        if (!byRisk[riskLevel]) byRisk[riskLevel] = { success: 0, failure: 0, ongoing: 0 };
                        byRisk[riskLevel][outcome] = (byRisk[riskLevel][outcome] || 0) + 1;
                    }

                    await updateDoc(statsRef, {
                        totalDecisions: newTotal,
                        [outcomeKey]: (stats[outcomeKey] || 0) + 1,
                        outcomesByCategory: byCat,
                        outcomesByRisk: byRisk
                    });
                }

                showToast('\u2713 Decision saved!');
                setTimeout(() => {
                    window.location.href = 'Timeline page.html';
                }, 1000);

            } catch (error) {
                console.error(error);
                showToast('Error saving decision.');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
    <script>
        // Avatar dropdown
        const avatar = document.getElementById('avatarBtn');
        const dropdown = document.getElementById('dropdown');
        avatar.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });
        document.addEventListener('click', function() {
            dropdown.classList.remove('open');
        });
        dropdown.addEventListener('click', function(e) { e.stopPropagation(); });

        // Radio button styling
        document.querySelectorAll('.radio-opt').forEach(function(opt) {
            opt.addEventListener('click', function() {
                const group = this.dataset.group;
                document.querySelectorAll('[data-group="' + group + '"]').forEach(function(o) {
                    o.className = 'radio-opt';
                });
                this.classList.add('selected-' + this.dataset.val);
            });
        });

        // Cancel button
        document.querySelector('.btn.btn-ghost').addEventListener('click', function() {
            window.location.href = 'home page.html';
        });
    </script>

</body>
</html>
