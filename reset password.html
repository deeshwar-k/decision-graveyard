<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login theme.css">
    <link rel="stylesheet" href="password theme.css">
</head>

<body>

    <div class="centre-card">

        <!-- Icon -->
        <div class="page-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
        </div>

        <!-- Form -->
        <div id="reset-form-wrapper">
            <h1 class="form-title">Reset Password</h1>
            <p class="form-subtitle">Choose a strong new password for your account.</p>

            <!-- New password -->
            <div class="field">
                <label for="fpassword">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="fpassword" name="fpassword" placeholder="Min. 8 characters"
                        autocomplete="new-password" oninput="updateStrength()">
                    <button class="pw-toggle" type="button" onclick="togglePw('fpassword', this)"
                        title="Show/hide password">Show</button>
                </div>
                <!-- Strength meter -->
                <div class="strength-bar" id="strength-bar">
                    <span id="s1"></span>
                    <span id="s2"></span>
                    <span id="s3"></span>
                    <span id="s4"></span>
                </div>
                <div class="strength-label" id="strength-label"></div>
                <span class="field-error" id="pw-error">Password must be at least 8 characters.</span>
            </div>

            <!-- Confirm password -->
            <div class="field">
                <label for="fconfirm">Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" id="fconfirm" name="fconfirm" placeholder="Re-enter password"
                        autocomplete="new-password">
                    <button class="pw-toggle" type="button" onclick="togglePw('fconfirm', this)"
                        title="Show/hide password">Show</button>
                </div>
                <span class="field-error" id="confirm-error">Passwords do not match.</span>
            </div>

            <button class="submit-btn" id="confirm-btn" onclick="handleReset(event)">Confirm New Password</button>

            <p class="switch-text" style="margin-top:22px;">
                <a href="login.html">← Back to login</a>
            </p>
        </div>

        <!-- Success state -->
        <div class="success-box" id="success-box">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <h3>Password Updated!</h3>
            <p>Your password has been reset successfully.<br>You can now sign in with your new password.</p>
            <a href="login.html" style="margin-top:8px; font-weight:600;">Go to Login →</a>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const pwInput = document.getElementById('fpassword');
        const confirmInput = document.getElementById('fconfirm');
        const pwError = document.getElementById('pw-error');
        const confirmError = document.getElementById('confirm-error');
        const confirmBtn = document.getElementById('confirm-btn');
        const formWrapper = document.getElementById('reset-form-wrapper');
        const successBox = document.getElementById('success-box');
        const toast = document.getElementById('toast');

        const bars = [document.getElementById('s1'), document.getElementById('s2'),
        document.getElementById('s3'), document.getElementById('s4')];
        const sLabel = document.getElementById('strength-label');

        /* ── Password visibility toggle ── */
        function togglePw(inputId, btn) {
            const input = document.getElementById(inputId);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.textContent = show ? 'Hide' : 'Show';
        }

        /* ── Strength meter ── */
        function scorePassword(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return Math.min(score, 4);
        }

        const levels = [
            { cls: '', label: '' },
            { cls: 's-weak', label: 'Weak', color: '#ef4444' },
            { cls: 's-fair', label: 'Fair', color: '#f59e0b' },
            { cls: 's-good', label: 'Good', color: '#10b981' },
            { cls: 's-strong', label: 'Strong', color: '#9d6fff' },
        ];

        function updateStrength() {
            const pw = pwInput.value;
            const score = pw.length === 0 ? 0 : Math.max(1, scorePassword(pw));
            const level = levels[score];

            bars.forEach((b, i) => {
                b.className = '';
                if (i < score) b.classList.add(level.cls);
            });

            sLabel.textContent = level.label;
            sLabel.style.color = level.color || '';

            // clear error on typing
            if (pw.length >= 8) {
                pwInput.classList.remove('error');
                pwError.classList.remove('visible');
            }
            // re-check confirm match live
            if (confirmInput.value) checkMatch();
        }

        function checkMatch() {
            const match = pwInput.value === confirmInput.value;
            if (!match && confirmInput.value.length > 0) {
                confirmInput.classList.add('error');
                confirmError.classList.add('visible');
            } else {
                confirmInput.classList.remove('error');
                confirmError.classList.remove('visible');
            }
            return match;
        }

        confirmInput.addEventListener('input', checkMatch);

        /* ── Toast ── */
        function showToast(msg, duration = 3000) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        /* ── Submit ── */
        function handleReset(e) {
            e.preventDefault();
            let valid = true;

            // Validate password length
            if (pwInput.value.length < 8) {
                pwInput.classList.add('error');
                pwError.classList.add('visible');
                valid = false;
            }

            // Validate match
            if (!checkMatch() || confirmInput.value === '') {
                confirmInput.classList.add('error');
                confirmError.classList.add('visible');
                valid = false;
            }

            if (!valid) return;

            // Loading state
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="spinner"></span>Updating…';

            // Simulate API call (replace with real fetch)
            setTimeout(() => {
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'Confirm New Password';

                formWrapper.style.display = 'none';
                successBox.classList.add('visible');
            }, 1800);
        }

        // Allow Enter key on confirm field
        confirmInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleReset(e);
        });
    </script>

</body>

</html>
